<VirtualHost *:80>
    ServerName edgeops.example.com

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-Frame-Options "DENY"

    RedirectMatch 404 "^/(data|\.env|\.git|\.run|node_modules)(/|$)"
    RedirectMatch 404 "\.(sqlite|sqlite3|db|conf|bak)$"

    ProxyPass /api http://127.0.0.1:8787/api
    ProxyPassReverse /api http://127.0.0.1:8787/api

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/edgeops-error.log
    CustomLog ${APACHE_LOG_DIR}/edgeops-access.log combined
</VirtualHost>
