<VirtualHost *:80>
    ServerName edgeops.example.com

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/edgeops-error.log
    CustomLog ${APACHE_LOG_DIR}/edgeops-access.log combined
</VirtualHost>
